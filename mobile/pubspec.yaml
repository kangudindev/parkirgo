name: parkirgo_mobile
description: "ParkirGo Mobile App — Aplikasi jukir pintar (Android/iOS)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

# =============================================================================
# DEPENDENCIES
#
# Note on substitutions from the spec in `docs/struktur_flutter.md`:
# - `solar_icons: ^0.1.0` (latest on pub) requires Flutter >=3.41; we're on
#   Flutter 3.22.2 (Dart 3.4.3). We use the documented fallback
#   (`iconify_flutter` + `flutter_svg`) so the app can pull Solar icons
#   over the Iconify network at runtime. See README for the full rationale.
# - `esc_pos_bluetooth: ^2.1.1` does not exist (typo in spec) and the entire
#   `esc_pos_*` ecosystem is still pinned to Dart <3.0. We keep
#   `flutter_blue_plus` (works) and stub the printer service; the printer
#   service will be wired to a working modern package in a later task.
# =============================================================================
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4

  # HTTP & networking
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.5
  pretty_dio_logger: ^1.3.1

  # Routing
  go_router: ^14.2.0

  # Local storage / offline
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3
  path: ^1.9.0
  shared_preferences: ^2.2.3

  # Permissions
  permission_handler: ^11.3.1

  # Camera / scanner / QR
  image_picker: ^1.1.2
  mobile_scanner: ^5.1.1
  qr_flutter: ^4.1.0

  # GPS
  geolocator: ^11.1.0

  # Bluetooth (kept for printer service; concrete ESC/POS package wired in
  # printer task — see README).
  flutter_blue_plus: ^1.32.7

  # Share
  share_plus: ^9.0.0

  # Icons — Iconify (Solar set) + flutter_svg renderer
  iconify_flutter: ^0.0.7
  flutter_svg: ^2.0.10+1

  # Typography
  google_fonts: ^6.2.1

  # Cached image (for QRIS image, profile photo)
  cached_network_image: ^3.3.1

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.4.0
  crypto: ^3.0.3
  dartz: ^0.10.1
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/illustrations/
