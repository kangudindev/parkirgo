services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: parkirgo-backend
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - composer-cache:/tmp/composer-cache
    environment:
      APP_NAME: ParkirGo
      APP_ENV: local
      APP_URL: https://parkirgo.eu.cc
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: parkirgo
      DB_USERNAME: parkirgo_user
      DB_PASSWORD: parkirgo_pass
      REDIS_HOST: redis
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: sync
      OCTANE_WORKERS: 2
      OCTANE_MAX_REQUESTS: 500
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - parkirgo
      - proxy

  mysql:
    image: mysql:8.4
    container_name: parkirgo-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: parkirgo
      MYSQL_USER: parkirgo_user
      MYSQL_PASSWORD: parkirgo_pass
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - parkirgo

  redis:
    image: redis:7-alpine
    container_name: parkirgo-redis
    restart: unless-stopped
    networks:
      - parkirgo

volumes:
  mysql-data:
  composer-cache:

networks:
  parkirgo:
    driver: bridge
  proxy:
    external: true
