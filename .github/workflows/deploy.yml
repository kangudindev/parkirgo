name: Deploy to Server

on:
  push:
    branches: [main]
    paths: ['backend/**', '.github/workflows/deploy.yml']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute deploy script on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            echo "=== Pull changes ==="
            cd /home/kangudin/parkirgo
            git pull origin main

            echo "=== Composer install ==="
            docker exec parkirgo-backend bash -c 'cd /var/www/html && composer install --no-interaction --prefer-dist --optimize-autoloader 2>&1'

            echo "=== Run migrations ==="
            docker exec parkirgo-backend php artisan migrate --force 2>&1

            echo "=== Build frontend ==="
            docker exec parkirgo-backend bash -c 'cd /var/www/html && npm install --legacy-peer-deps 2>&1 && npm run build 2>&1'

            echo "=== Optimize ==="
            docker exec parkirgo-backend php artisan optimize:clear 2>&1
            docker exec parkirgo-backend php artisan optimize 2>&1

            echo "=== Reload Octane ==="
            docker exec parkirgo-backend php artisan octane:reload 2>&1

            echo "=== Deploy complete ==="
