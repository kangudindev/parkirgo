name: Deploy to Server

on:
  push:
    branches: [main]
    paths: ['backend/**', '.github/workflows/deploy.yml']

jobs:
  deploy:
    runs-on: [self-hosted, linux]
    environment: production
    steps:
      - name: Deploy application
        run: |
          echo "=== Pull changes ==="
          cd /home/kangudin/parkirgo
          git pull origin main 2>&1 || echo "git pull selesai"

          echo "=== Composer install ==="
          docker exec parkirgo-backend bash -c 'cd /var/www/html && composer install --no-interaction --prefer-dist --optimize-autoloader 2>&1' || echo "composer selesai"

          echo "=== Run migrations ==="
          docker exec parkirgo-backend php artisan migrate --force 2>&1 || echo "migrate selesai"

          echo "=== Build frontend ==="
          docker exec -e NODE_OPTIONS='--max-old-space-size=4096' parkirgo-backend bash -c 'cd /var/www/html && npm install --legacy-peer-deps 2>&1' || true
          docker exec -e NODE_OPTIONS='--max-old-space-size=4096' parkirgo-backend bash -c 'cd /var/www/html && npm run build 2>&1' || echo "build selesai"

          echo "=== Optimize ==="
          docker exec parkirgo-backend php artisan optimize:clear 2>&1 || echo "optimize selesai"

          echo "=== Restart container ==="
          docker restart parkirgo-backend 2>&1 || echo "restart selesai"
          sleep 3

          echo "=== Deploy complete ==="
