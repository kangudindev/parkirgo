name: Deploy to Server

on:
  push:
    branches: [main]
    paths: ['backend/**', '.github/workflows/deploy.yml']

jobs:
  deploy:
    runs-on: [self-hosted, linux]
    steps:
      - name: Deploy application
        run: |
          set -e
          echo "=== Pull changes ==="
          cd /home/kangudin/parkirgo
          git pull origin main

          echo "=== Composer install ==="
          docker exec parkirgo-backend bash -c 'cd /var/www/html && composer install --no-interaction --prefer-dist --optimize-autoloader 2>&1'

          echo "=== Run migrations ==="
          docker exec parkirgo-backend php artisan migrate --force 2>&1

          echo "=== Build frontend ==="
          docker exec -e NODE_OPTIONS='--max-old-space-size=4096' parkirgo-backend bash -c 'cd /var/www/html && npm install --legacy-peer-deps 2>&1 && npm run build 2>&1'

          echo "=== Optimize ==="
          docker exec parkirgo-backend php artisan optimize:clear 2>&1

          echo "=== Restart container ==="
          docker restart parkirgo-backend 2>&1
          sleep 3

          echo "=== Deploy complete ==="
