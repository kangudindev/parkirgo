name: Build APK ParkirGo

on:
  push:
    branches: [main, develop]
    paths:
      - 'flutter_parkirgo/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_parkirgo

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK release
        run: flutter build apk --release
        env:
          BASE_URL: ${{ vars.BASE_URL || 'http://parkirgo.localhost/api' }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ParkirGo-APK-${{ github.sha }}
          path: flutter_parkirgo/build/app/outputs/flutter-apk/*.apk
          retention-days: 30
